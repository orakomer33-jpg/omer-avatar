<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        #start-btn { padding: 15px 30px; font-size: 18px; background: #0056b3; color: white; border: none; cursor: pointer; border-radius: 5px; margin-top: 50px; }
        #content { display: none; }
        #avatar { width: 200px; display: block; margin: 0 auto; }
        .controls { margin-top: 20px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

<button id="start-btn" onclick="startApp()">Deneyimleri Başlat</button>

<div id="content">
    <img id="avatar" src="avatar.jpg">
    <!-- controls özelliği ekleyerek tarayıcının sesi yönetmesine izin veriyoruz -->
    <audio id="ses-dosyasi" controls style="display:none;"></audio>
    <div class="controls">
        <button onclick="cal('https://media1.vocaroo.com/mp3/182rVa21GTqS')">PFW</button>
        <button onclick="cal('https://media1.vocaroo.com/mp3/1ccgD1c1m1LS')">Numesys</button>
        <button onclick="cal('https://media1.vocaroo.com/mp3/1lEu4Ox9Q2nA')">Bias</button>
        <button onclick="cal('https://media1.vocaroo.com/mp3/1gFjaaFc1HeL')">TÜBİTAK</button>
        <button onclick="cal('https://media1.vocaroo.com/mp3/1lgnyIF5hHLK')">TUSAŞ</button>
    </div>
</div>

<script>
    function startApp() {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }

    function cal(url) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = url;
        ses.load(); 
        ses.play().catch(function(error) {
            alert("Ses çalınamadı. Lütfen internet bağlantınızı kontrol edin veya butona tekrar basın.");
        });
    }
</script>

</body>
</html>
