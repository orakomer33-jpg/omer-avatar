<!DOCTYPE html>
<html>
<body>
    <!-- Karakter görseli -->
    <img id="avatar" src="Gemini_Generated_Image_vkawbdvkawbdvkaw_2.png" style="width:200px; cursor:pointer;" onclick="konus()">
    
    <!-- Ses oynatıcı -->
    <audio id="ses-dosyasi" src="SENIN_DIRECT_DRIVE_LINKIN_BURAYA"></audio>

    <script>
        function konus() {
            var ses = document.getElementById("ses-dosyasi");
            var avatar = document.getElementById("avatar");
            
            // Buraya basit bir animasyon ekleyebiliriz (örneğin görseli hafif büyütme)
            avatar.style.transform = "scale(1.05)"; 
            ses.play();
            
            // Ses bitince karakteri eski haline getir
            ses.onended = function() {
                avatar.style.transform = "scale(1)";
            };
        }
    </script>
</body>
</html>
