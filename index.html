<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; background-color: #f8f9fa; 
        }
        .container { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 500px;
        }
        #avatar { 
            width: 180px; height: 180px; border-radius: 50%; 
            object-fit: cover; border: 5px solid #0056b3; margin-bottom: 20px; 
        }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 25px; }
        button { 
            padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; 
            background: #0056b3; color: white; border: none; border-radius: 10px; 
            transition: all 0.3s; 
        }
        button:hover { background: #004494; transform: translateY(-2px); }
        audio { width: 100%; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container">
    <img id="avatar" src="avatar.jpg" alt="Ömer">
    <div class="controls">
        <button onclick="cal('pfw.mp3')">PFW</button>
        <button onclick="cal('numesys.mp3')">Numesys</button>
        <button onclick="cal('bias.mp3')">Bias</button>
        <button onclick="cal('tubitak.mp3')">TÜBİTAK</button>
        <button onclick="cal('tusas.mp3')">TUSAŞ</button>
    </div>
    <audio id="ses-dosyasi" controls></audio>
</div>

<script>
    function cal(dosyaAdi) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = dosyaAdi;
        ses.play();
    }
</script>

</body>
</html>
