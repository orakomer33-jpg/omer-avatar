<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0; background-color: #f0f2f5; 
        }
        .container { 
            background: white; padding: 50px; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); text-align: center; 
            width: 90%; max-width: 700px; 
        }
        #avatar { 
            width: 200px; height: 200px; border-radius: 50%; 
            object-fit: cover; border: 6px solid #0056b3; margin-bottom: 30px; 
        }
        /* Butonları yan yana ve büyük harfle hizaladık */
        .controls { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; 
        }
        button { 
            padding: 15px 25px; font-size: 16px; font-weight: 800; cursor: pointer; 
            background: #0056b3; color: white; border: none; border-radius: 12px; 
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #004494; transform: scale(1.05); }
        audio { width: 100%; border-radius: 50px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img id="avatar" src="avatar.jpg" alt="Ömer">
    
    <div class="controls">
        <button onclick="cal('pfw.mp3')">PFW</button>
        <button onclick="cal('numesys.mp3')">NUMESYS</button>
        <button onclick="cal('bias.mp3')">BIAS</button>
        <button onclick="cal('tubitak.mp3')">TÜBİTAK</button>
        <button onclick="cal('tusas.mp3')">TUSAŞ</button>
    </div>
    
    <audio id="ses-dosyasi" controls></audio>
</div>

<script>
    function cal(dosyaAdi) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = dosyaAdi;
        ses.play();
    }
</script>

</body>
</html>
