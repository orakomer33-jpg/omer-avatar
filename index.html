<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        #start-btn { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #avatar { width: 200px; display: block; margin: 0 auto; }
        .controls { margin-top: 20px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

<!-- 1. Adım: Kullanıcı izni için görünür bir buton -->
<div id="start-overlay">
    <button id="start-btn" onclick="startAudio()">Deneyimleri Başlat</button>
</div>

<!-- 2. Adım: Avatar ve butonlar (başlangıçta gizli) -->
<div id="content" style="display:none;">
    <img id="avatar" src="https://orakomer33-jpg.github.io/omer-avatar/avatar.jpg">
    <audio id="ses-dosyasi"></audio>
    <div class="controls">
        <button onclick="cal('https://drive.google.com/uc?export=download&id=1sbJCnj9XLgYJaMxjd7KEBcrz_ejFx41K')">PFW</button>
        <button onclick="cal('https://drive.google.com/uc?export=download&id=1qTDdDhZ3dHa1gYfzPYIlKOBSJPk_E4qC')">Numesys</button>
        <button onclick="cal('https://drive.google.com/uc?export=download&id=1fLoSb8cWzqtI8YJee2rPl645_pPwHbJF')">Bias</button>
        <button onclick="cal('https://drive.google.com/uc?export=download&id=1mM_GB6d2JOua1oz9z1iLNr_igjKGRWIv')">TÜBİTAK</button>
        <button onclick="cal('https://drive.google.com/uc?export=download&id=1CfdAEWTpTHMTfy57TY8TjreL4HmoUGBq')">TUSAŞ</button>
    </div>
</div>

<script>
    function startAudio() {
        // İzin al ve içeriği göster
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }

    function cal(url) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = url;
        ses.play();
    }
</script>

</body>
</html>
