<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Resim yüklenemezse hata ayıklamak için alt etiketi ekledik -->
<img id="avatar" src="avatar.jpg" alt="Karakter Görseli" style="width:200px; display:block;">

<audio id="ses-dosyasi"></audio>

<div style="margin-top:20px;">
    <button onclick="cal('https://drive.google.com/uc?export=download&id=1sbJCnj9XLgYJaMxjd7KEBcrz_ejFx41K')">PFW</button>
    <button onclick="cal('https://drive.google.com/uc?export=download&id=1qTDdDhZ3dHa1gYfzPYIlKOBSJPk_E4qC')">Numesys</button>
    <button onclick="cal('https://drive.google.com/uc?export=download&id=1fLoSb8cWzqtI8YJee2rPl645_pPwHbJF')">Bias</button>
    <button onclick="cal('https://drive.google.com/uc?export=download&id=1mM_GB6d2JOua1oz9z1iLNr_igjKGRWIv')">TÜBİTAK</button>
    <button onclick="cal('https://drive.google.com/uc?export=download&id=1CfdAEWTpTHMTfy57TY8TjreL4HmoUGBq')">TUSAŞ</button>
</div>

<script>
    function cal(url) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = url;
        ses.play().catch(e => alert("Sesi oynatmak için önce sayfaya bir kez tıkla!"));
    }
</script>

</body>
</html>
