<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        #avatar { width: 200px; display: block; margin: 0 auto; }
        .controls { margin-top: 20px; }
        /* Vocaroo oynatıcılarını başlangıçta gizliyoruz */
        .player { display: none; margin-top: 10px; }
    </style>
</head>
<body>

<img id="avatar" src="avatar.jpg">

<div class="controls">
    <button onclick="goster('pfw')">PFW</button>
    <button onclick="goster('numesys')">Numesys</button>
    <button onclick="goster('bias')">Bias</button>
    <button onclick="goster('tubitak')">TÜBİTAK</button>
    <button onclick="goster('tusas')">TUSAŞ</button>
</div>

<!-- Vocaroo Embed Kodları -->
<div id="pfw" class="player"><iframe width="100%" height="60" src="https://voca.ro/182rVa21GTqS" frameborder="0"></iframe></div>
<div id="numesys" class="player"><iframe width="100%" height="60" src="https://voca.ro/1ccgD1c1m1LS" frameborder="0"></iframe></div>
<div id="bias" class="player"><iframe width="100%" height="60" src="https://voca.ro/1lEu4Ox9Q2nA" frameborder="0"></iframe></div>
<div id="tubitak" class="player"><iframe width="100%" height="60" src="https://voca.ro/1gFjaaFc1HeL" frameborder="0"></iframe></div>
<div id="tusas" class="player"><iframe width="100%" height="60" src="https://voca.ro/1lgnyIF5hHLK" frameborder="0"></iframe></div>

<script>
    function goster(id) {
        // Tüm oynatıcıları gizle
        document.querySelectorAll('.player').forEach(p => p.style.display = 'none');
        // Seçileni göster
        document.getElementById(id).style.display = 'block';
    }
</script>

</body>
</html>
