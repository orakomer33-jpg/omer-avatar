<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="text-align:center; font-family:sans-serif; background:white;">

<img src="avatar.jpg" style="width:200px; display:block; margin:0 auto;">

<div style="margin-top:20px;">
    <!-- Sesi doğrudan GitHub'dan çekiyoruz -->
    <button onclick="cal('pfw.mp3')">PFW</button>
    <button onclick="cal('numesys.mp3')">Numesys</button>
    <button onclick="cal('bias.mp3')">Bias</button>
    <button onclick="cal('tubitak.mp3')">TÜBİTAK</button>
    <button onclick="cal('tusas.mp3')">TUSAŞ</button>
</div>

<!-- controls özelliğini ekledik, böylece tarayıcı kendi çalar'ını kullanacak -->
<audio id="ses-dosyasi" controls style="margin-top:20px;"></audio>

<script>
    function cal(dosyaAdi) {
        var ses = document.getElementById("ses-dosyasi");
        ses.src = dosyaAdi;
        ses.play();
    }
</script>

</body>
</html>
